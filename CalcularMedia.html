
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Média Semestral</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Simulador de média semestral</h1>

    <form id="formMedia">
        <fieldset>
            <legend>Nota N1</legend>
            <label>Atividade 1:</label>
            <input type="number" step="0.1" id="atv1" min="0" max="10">

            <label>Prova 1:</label>
            <input type="number" step="0.1" id="prova1" min="0" max="10">
        </fieldset>

        <fieldset>
            <legend>Nota N2</legend>
            <label>Prova Integrada:</label>
            <input type="number" step="0.1" id="n2" min="0" max="10">
        </fieldset>

        <fieldset>
            <legend>Nota N3</legend>
            <label>Atividade 2:</label>
            <input type="number" step="0.1" id="atv2" min="0" max="10">

            <label>Prova 2:</label>
            <input type="number" step="0.1" id="prova2" min="0" max="10">
        </fieldset>

        <button type="button" onclick="calcularMedia()">Calcular</button>
    </form>

    <div id="resultado"></div>

    <footer>
        Desenvolvido por Erisvan Guimarães
    </footer>

    <script src="script.js"></script>
</body>
</html>
