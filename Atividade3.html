<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulador de Média Semestral</title>

  <!-- Ajuste o nome do arquivo se o seu CSS tiver outro nome -->
  <link rel="stylesheet" href="Atividade3.css" />
</head>

<body>
  <main class="container">
    <h1>Simulador de média semestral</h1>

    <form id="formNotas" class="card" autocomplete="off">
      <section class="secao">
        <h2>N1</h2>

        <div class="campo">
          <label for="atv1">Atividade 1:</label>
          <input type="number" step="0.1" min="0" max="10" id="atv1" placeholder="0 a 10" />
        </div>

        <div class="campo">
          <label for="prova1">Prova 1:</label>
          <input type="number" step="0.1" min="0" max="10" id="prova1" placeholder="0 a 10" />
        </div>
      </section>

      <section class="secao">
        <h2>N2</h2>

        <div class="campo">
          <label for="n2">Prova Integrada:</label>
          <input type="number" step="0.1" min="0" max="10" id="n2" placeholder="0 a 10" />
        </div>
      </section>

      <section class="secao">
        <h2>N3</h2>

        <div class="campo">
          <label for="atv2">Atividade 2:</label>
          <input type="number" step="0.1" min="0" max="10" id="atv2" placeholder="0 a 10" />
        </div>

        <div class="campo">
          <label for="prova2">Prova 2:</label>
          <input type="number" step="0.1" min="0" max="10" id="prova2" placeholder="0 a 10" />
        </div>
      </section>

      <div class="botoes">
        <button type="button" class="btn btn-calcular" id="btnCalcular">Calcular</button>
        <button type="button" class="btn btn-limpar" id="btnLimpar">Limpar</button>
      </div>
    </form>

    <div id="resultado" class="resultado" aria-live="polite"></div>

    <footer>
      Desenvolvido por EG - Erisvan Guimarães
    </footer>
  </main>

  <!-- Ajuste o nome do arquivo se o seu JS tiver outro nome -->
  <script src="Atividade3.js"></script>
</body>
</html>
